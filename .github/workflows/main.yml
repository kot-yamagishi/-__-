name: deploy production

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - id: staging-ssh
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          SSH_KEY: ${{ secrets.DEV_SSH_KEY }}

      - name: Deploy to Staging
        run: |
          ssh ${{ steps.staging-ssh.outputs.SERVER }} bash /app/kot_yamagishi/deploy.sh

      - name: Run Cypress on Staging
        run: |
          ssh ${{ steps.staging-ssh.outputs.SERVER }} "cd /ci && npx cypress run --browser chrome --spec cypress/e2e/kot_yamagishi.cy.js"

      - id: production-ssh
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy to Production
        run: |
          ssh ${{ steps.production-ssh.outputs.SERVER }} "bash /home/kot_yamagishi/deploy.sh"
